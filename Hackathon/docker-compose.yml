version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./hackathon.db
      - AT_USERNAME=${AT_USERNAME:-sandbox}
      - AT_API_KEY=${AT_API_KEY:-}
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    ports:
      - "8501:8501"
    environment:
      - UPSTREAM_API_URL=http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
